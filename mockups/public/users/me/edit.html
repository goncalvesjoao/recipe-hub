<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Hub</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yohns/picocss@2.2.10/css/pico.min.css" />
  <style>
    :root {
      --pico-form-element-spacing-vertical: 0.7rem;
      --pico-form-element-spacing-horizontal: 1rem;
      --pico-font-size: 1rem;
    }
  </style>
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><strong><a href="/">RecipeHub</a></strong></li>
      </ul>
      <ul>
        <li>
          <details class="dropdown">
            <summary>👤</summary>
            <ul>
              <li><a href="/recipes/new">Create Recipe</a></li>
              <li><a href="/users/me">My Profile</a></li>
              <li><a href="/users/me/account">My Account</a></li>
              <li><a href="#">Log out</a></li>
            </ul>
          </details>
        </li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Edit Profile</h1>

    <form>
      <label>Name
        <input type="text" value="John Doe">
      </label>

      <label>Avatar
        <input type="file">
      </label>

      <button type="submit">Save</button>
    </form>
  </main>

  <footer class="container">
    <hr>
    <small>
      MIT License • <a href="https://github.com/goncalvesjoao/recipe-hub" target="_blank">GitHub</a>
    </small>
  </footer>
</body>
</html>
