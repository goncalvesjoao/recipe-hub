<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Hub</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yohns/picocss@2.2.10/css/pico.min.css" />
  <style>
    :root {
      --pico-form-element-spacing-vertical: 0.7rem;
      --pico-form-element-spacing-horizontal: 1rem;
      --pico-font-size: 1rem;
    }
  </style>
</head>
<body>
  <header class="container">
    <nav role="navigation" data-position="end" data-breakpoint="lg">
      <ul>
        <li><a href="/" aria-current="page">RecipeHub</a></li>
      </ul>

      <ul>
        <li><strong>Give Us a like on GitHub!</strong></li>
      </ul>

      <input type="checkbox" id="hamburger-toggle">
      <label for="hamburger-toggle" style="font-size: calc(var(--pico-font-size) * 2);" aria-label="Menu" aria-controls="nav-example2"> ≡ </label>

      <ol id="nav-example2" role="list">
        <li><a role="listitem" href="/recipes/new">Add Recipe</a></li>
        <li role="listitem">
          <details class="dropdown">
            <summary>👤</summary>
            <ul dir="rtl">
              <li><a href="/users/me">My Profile</a></li>
              <li><a href="/users/me/account">My Account</a></li>
              <li><a href="#">Log out</a></li>
            </ul>
          </details>
        </li>
      </ol>
    </nav>
  </header>

  <main class="container">
    <h1>Recipes</h1>

    <article>
      <h2>Spaghetti Carbonara</h2>
      <p>By <a href="/users/1">👤 John</a></p>
      <img src="https://via.placeholder.com/400x200" alt="recipe">

      <p>❤️ 120</p>

      <a href="/recipes/1">See more</a>
      <button>Like</button>

      <!-- Owner only -->
      <a href="/recipes/1/edit">Edit</a>
      <button class="secondary">Delete</button>
    </article>

    <nav>
      <ul>
        <li><a href="#">Previous</a></li>
        <li><a href="#">Next</a></li>
      </ul>
    </nav>
  </main>

  <footer class="container">
    <hr>
    <small>
      MIT License • <a href="https://github.com/goncalvesjoao/recipe-hub" target="_blank">GitHub</a>
    </small>
  </footer>
</body>
</html>
