<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Hub</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yohns/picocss@2.2.10/css/pico.min.css" />
  <style>
    :root {
      --pico-form-element-spacing-vertical: 0.7rem;
      --pico-form-element-spacing-horizontal: 1rem;
      --pico-font-size: 1rem;
    }
  </style>
</head>
<body>
  <header class="container">
    <nav role="navigation" data-position="end" data-breakpoint="lg">
      <ul>
        <li><a href="/">RecipeHub</a></li>
      </ul>

      <ul>
        <li><strong>Give Us a like on GitHub!</strong></li>
      </ul>

      <input type="checkbox" id="hamburger-toggle">
      <label for="hamburger-toggle" style="font-size: calc(var(--pico-font-size) * 2);" aria-label="Menu" aria-controls="nav-example2"> ≡ </label>

      <ol id="nav-example2" role="list">
        <li><a role="listitem" href="/recipes/new" aria-current="page">Add Recipe</a></li>
        <li role="listitem">
          <details class="dropdown">
            <summary>👤</summary>
            <ul dir="rtl">
              <li><a href="/users/me">My Profile</a></li>
              <li><a href="/users/me/account">My Account</a></li>
              <li><a href="#">Log out</a></li>
            </ul>
          </details>
        </li>
      </ol>
    </nav>
  </header>

  <main class="container">
    <h1>Create Recipe</h1>

    <form>
      <label>Name
        <input type="text" required>
      </label>

      <label>Preparation Time (seconds)
        <input type="number">
      </label>

      <label>Cooking Time (seconds)
        <input type="number">
      </label>

      <label>Image
        <input type="file">
      </label>

      <h2>Ingredients</h2>

      <div>
        <input placeholder="Ingredient">
        <input placeholder="Quantity">
        <input placeholder="Unit">
        <button type="button">Remove</button>
      </div>

      <button type="button">Add Ingredient</button>

      <label>Steps
        <textarea rows="5"></textarea>
      </label>

      <button type="submit">Create</button>
    </form>
  </main>

  <footer class="container">
    <hr>
    <small>
      MIT License • <a href="https://github.com/goncalvesjoao/recipe-hub" target="_blank">GitHub</a>
    </small>
  </footer>
</body>
</html>
